services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: class-pet-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-class-pet-game-secret-key-2024}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
      - AI_MODEL=doubao-seed-2-0-pro-260215
    volumes:
      - ${DB_PATH:-./backend/data/database.sqlite}:/app/data/database.sqlite
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: class-pet-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_SSL_PORT:-443}:443"
    volumes:
      - ${CERT_PATH:-./certs}:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
