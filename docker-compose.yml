version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: class-pet-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-class-pet-game-secret-key-2024}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
      - AI_MODEL=doubao-seed-2-0-pro-260215
    volumes:
      # 挂载外部数据库文件（每个域名部署时修改这个路径）
      - ${DB_PATH:-./backend/data/database.sqlite}:/app/data/database.sqlite
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
